<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chá de Bebê</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #d7f0ff, #ffe4ef);
        }

        .card {
            background: #fff;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 12px 30px rgba(0,0,0,.15);
        }

        h1 {
            color: #333;
            margin-bottom: 15px;
        }

        p {
            color: #666;
            margin-bottom: 30px;
        }

        a {
            display: inline-block;
            text-decoration: none;
            background: #4CAF50;
            color: white;
            padding: 14px 28px;
            border-radius: 10px;
            font-weight: bold;
            transition: .2s;
        }

        a:hover {
            background: #43a047;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Chá Revelação 👶</h1>

        <p>Clique no botão abaixo para confirmar sua presença.</p>

        <a href="confirmado.html">
            Confirmar Presença
        </a>
    </div>

</body>
</html>
